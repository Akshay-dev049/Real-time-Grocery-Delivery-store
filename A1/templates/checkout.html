<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout – FreshGrocery</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
  .checkout-wrapper { max-width: 700px; margin: 40px auto; padding: 0 20px; }
  .page-title { font-size: 1.8rem; font-weight: 800; font-family: 'Poppins', sans-serif; margin-bottom: 30px; text-align: center; }
  .steps { display: flex; justify-content: center; gap: 0; margin-bottom: 36px; align-items: center; }
  .step { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: #b2bec3; }
  .step-num { width: 32px; height: 32px; border-radius: 50%; background: #dfe6e9; color: #636e72; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; flex-shrink: 0; }
  .step.active .step-num { background: #1e3c72; color: white; }
  .step.done   .step-num { background: #27ae60; color: white; }
  .step.active { color: #1e3c72; }
  .step.done   { color: #27ae60; }
  .step-line { width: 60px; height: 2px; background: #dfe6e9; margin: 0 8px; flex-shrink: 0; }
  .step-line.done { background: #27ae60; }
  .section { background: white; border-radius: 14px; padding: 28px; box-shadow: 0 4px 20px rgba(0,0,0,.08); margin-bottom: 20px; display: none; }
  .section.active { display: block; }
  .section h3 { font-family: 'Poppins', sans-serif; font-size: 1.1rem; margin-bottom: 20px; color: #1e3c72; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 700; color: #636e72; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
  .form-group input, .form-group select {
    width: 100%; padding: 12px 14px; border: 2px solid #dfe6e9; border-radius: 10px;
    font-size: 15px; font-family: 'Nunito', sans-serif; outline: none;
    transition: border-color .2s; background: white; color: #2d3436;
  }
  .form-group input:focus, .form-group select:focus { border-color: #1e3c72; }
  .btn-next { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; border: none; padding: 13px 28px; border-radius: 10px; font-size: 15px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer; transition: opacity .2s; width: 100%; margin-top: 8px; }
  .btn-next:hover { opacity: .9; }
  .btn-back { background: #f0f3f4; color: #636e72; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; margin-right: 10px; }
  .payment-option { border: 2px solid #dfe6e9; border-radius: 10px; padding: 14px 18px; margin-bottom: 12px; cursor: pointer; transition: border-color .2s; display: flex; align-items: center; gap: 12px; }
  .payment-option:hover { border-color: #1e3c72; }
  .payment-option input[type="radio"] { transform: scale(1.3); accent-color: #1e3c72; }
  .payment-option label { cursor: pointer; font-weight: 700; font-size: 15px; }
  .order-summary-box { background: #f8f9fa; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .summary-row { display: flex; justify-content: space-between; font-size: 14px; padding: 5px 0; }
  .summary-total { display: flex; justify-content: space-between; font-size: 1.1rem; font-weight: 800; color: #1e3c72; padding-top: 10px; border-top: 2px solid #dfe6e9; margin-top: 8px; }
  .location-status { font-size: 13px; color: #636e72; margin-top: 8px; padding: 10px 14px; background: #f8f9fa; border-radius: 8px; }
  .location-status.got      { color: #155724; background: #d4edda; }
  .location-status.err      { color: #856404; background: #fff3cd; }
  .location-status.checking { color: #856404; background: #fff3cd; }
  .range-error { background: #f8d7da; color: #721c24; border: 1.5px solid #f5c6cb; border-radius: 10px; padding: 16px 20px; margin: 12px 0; font-weight: 700; font-size: 14px; display: none; }
  .range-error .dist-info { font-size: 13px; opacity: .85; margin-top: 6px; font-weight: 600; }
  .range-ok { background: #d4edda; color: #155724; border-radius: 8px; padding: 10px 14px; font-size: 13px; font-weight: 700; margin: 8px 0; display: none; }
  @media (max-width: 500px) { .row-2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">🛒 Fresh<span style="color:#27ae60;">Grocery</span></div>
  <div class="nav-right">
    <a href="/cart" style="color:white;">← Back to Cart</a>
  </div>
</nav>

<div class="checkout-wrapper">
  <div class="page-title">Checkout</div>

  <!-- Steps -->
  <div class="steps">
    <div class="step active" id="s1"><div class="step-num">1</div> Billing</div>
    <div class="step-line" id="line1"></div>
    <div class="step" id="s2"><div class="step-num">2</div> Delivery</div>
    <div class="step-line" id="line2"></div>
    <div class="step" id="s3"><div class="step-num">3</div> Payment</div>
  </div>

  <!-- STEP 1: BILLING -->
  <div class="section active" id="sec1">
    <h3>📋 Billing Information</h3>
    <div class="row-2">
      <div class="form-group"><label>First Name *</label><input type="text" id="fname" placeholder="John"></div>
      <div class="form-group"><label>Last Name *</label><input type="text" id="lname" placeholder="Doe"></div>
    </div>
    <div class="form-group"><label>Email Address *</label><input type="email" id="email" placeholder="john@example.com"></div>
    <div class="form-group"><label>Phone Number *</label><input type="tel" id="phone1" placeholder="+91 9876543210"></div>
    <button class="btn-next" onclick="gotoStep2()">Continue to Delivery →</button>
  </div>

  <!-- STEP 2: DELIVERY -->
  <div class="section" id="sec2">
    <h3>📍 Delivery Address</h3>
    <div class="form-group"><label>Full Address *</label><input type="text" id="address" placeholder="House/Flat No, Building Name"></div>
    <div class="form-group"><label>Street / Area *</label><input type="text" id="street" placeholder="Street name, locality"></div>
    <div class="row-2">
      <div class="form-group"><label>City *</label><input type="text" id="city" placeholder="Hyderabad"></div>
      <div class="form-group"><label>PIN Code *</label><input type="text" id="zip" placeholder="500001"></div>
    </div>
    <div class="form-group">
      <label>State *</label>
      <select id="state">
        <option value="">Select State</option>
        <option>Telangana</option><option>Andhra Pradesh</option><option>Karnataka</option>
        <option>Tamil Nadu</option><option>Maharashtra</option><option>Delhi</option>
        <option>Uttar Pradesh</option><option>West Bengal</option><option>Gujarat</option><option>Rajasthan</option>
      </select>
    </div>
    <div class="form-group"><label>Delivery Phone *</label><input type="tel" id="phone2" placeholder="+91 9876543210"></div>

    <div id="locationStatus" class="location-status checking">📍 Getting your location for tracking...</div>
    <div id="rangeOk"  class="range-ok">✅ Great! We deliver to your location.</div>
    <div id="rangeErr" class="range-error">
      🚫 We may not deliver to your location.
      <div class="dist-info" id="rangeErrDetail"></div>
    </div>

    <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn-back" onclick="gotoStep(1)">← Back</button>
      <button class="btn-next" style="width:auto;padding:13px 28px;flex:1;"
              id="btnStep3" onclick="gotoStep3()">Continue to Payment →</button>
    </div>
  </div>

  <!-- STEP 3: PAYMENT -->
  <div class="section" id="sec3">
    <h3>💳 Payment Method</h3>
    <div class="order-summary-box" id="summaryBox">
      <div style="font-weight:700;margin-bottom:8px;">Order Summary</div>
      <div id="summaryItems"></div>
      <div class="summary-total"><span>Total</span><span>₹<span id="summaryTotal">0</span></span></div>
    </div>
    <div class="payment-option">
      <input type="radio" name="pay" id="payRazorpay" value="razorpay" checked>
      <label for="payRazorpay">💳 Pay Online (Cards / UPI / Net Banking)</label>
    </div>
    <div class="payment-option">
      <input type="radio" name="pay" id="payCOD" value="cod">
      <label for="payCOD">💵 Cash on Delivery</label>
    </div>
    <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn-back" onclick="gotoStep(2)">← Back</button>
      <button class="btn-next" style="width:auto;padding:13px 28px;flex:1;"
              id="placeBtn" onclick="placeOrder()">Place Order →</button>
    </div>
  </div>
</div>

<!-- Hidden GPS fields -->
<input type="hidden" id="user_lat">
<input type="hidden" id="user_lng">

<script>
// ── Config from Flask ──────────────────────────────────────
const STORE_LAT       = {{ store_lat | default('null') }};
const STORE_LNG       = {{ store_lng | default('null') }};
const DELIVERY_RADIUS = {{ delivery_radius | default(30) }};
const RAZORPAY_KEY    = '{{ razorpay_key }}';

let cartData = [];

// ── IMPORTANT: start as TRUE so GPS delay never blocks the user ──
// If store location IS set and GPS shows out-of-range, we warn but still allow
let rangeCheckPassed = true;

// ── Load cart summary ──────────────────────────────────────
fetch('/get-cart').then(r => r.json()).then(cart => {
  cartData = cart;
  let html = '', total = 0;
  cart.forEach(item => {
    let sub = item.price * item.qty; total += sub;
    html += `<div class="summary-row"><span>${item.name} × ${item.qty}</span><span>₹${sub.toFixed(2)}</span></div>`;
  });
  document.getElementById('summaryItems').innerHTML = html || '<p style="color:#636e72;">Cart is empty</p>';
  document.getElementById('summaryTotal').innerText = total.toFixed(2);
});

// ── GPS capture ────────────────────────────────────────────
function getLocation() {
  const el = document.getElementById('locationStatus');
  if (!navigator.geolocation) {
    el.className = 'location-status err';
    el.innerText = '⚠ GPS not supported on this device. Proceeding without tracking.';
    return;
  }
  el.className = 'location-status checking';
  el.innerText = '📍 Getting your location...';

  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude, lng = pos.coords.longitude;
      document.getElementById('user_lat').value = lat;
      document.getElementById('user_lng').value = lng;
      el.className = 'location-status got';
      el.innerText = `✅ Location captured (${lat.toFixed(4)}, ${lng.toFixed(4)})`;
      checkDeliveryRange(lat, lng);
    },
    err => {
      el.className = 'location-status err';
      el.innerText = '⚠ Location access denied. You can still place the order.';
      document.getElementById('rangeOk').style.display = 'block';
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}

function checkDeliveryRange(lat, lng) {
  if (!STORE_LAT || !STORE_LNG) {
    document.getElementById('rangeOk').style.display = 'block';
    return;
  }
  fetch('/check-delivery-range', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ lat, lng })
  })
  .then(r => r.json())
  .then(data => {
    if (data.in_range) {
      document.getElementById('rangeOk').style.display  = 'block';
      document.getElementById('rangeErr').style.display = 'none';
    } else {
      // Show warning but DO NOT block — rangeCheckPassed stays true
      document.getElementById('rangeErr').style.display = 'block';
      document.getElementById('rangeOk').style.display  = 'none';
      const dist = data.distance_km || data.distance || '?';
      const max  = data.max_km      || data.radius   || DELIVERY_RADIUS;
      document.getElementById('rangeErrDetail').innerText =
        `You are ${dist} km away. We normally deliver within ${max} km of our store.`;
    }
  })
  .catch(() => {
    document.getElementById('rangeOk').style.display = 'block';
  });
}

// ── Step navigation ────────────────────────────────────────
function gotoStep(n) {
  [1, 2, 3].forEach(i => {
    document.getElementById('sec' + i).classList.toggle('active', i === n);
    const sEl   = document.getElementById('s' + i);
    const lEl   = document.getElementById('line' + i);
    sEl.classList.remove('active', 'done');
    if (lEl) lEl.classList.remove('done');
    if (i < n)  { sEl.classList.add('done'); if (lEl) lEl.classList.add('done'); }
    if (i === n)  sEl.classList.add('active');
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
  if (n === 2) getLocation();
}

function gotoStep2() {
  const fname = document.getElementById('fname').value.trim();
  const lname = document.getElementById('lname').value.trim();
  const phone = document.getElementById('phone1').value.trim();
  const email = document.getElementById('email').value.trim();
  if (!fname || !lname) { alert('Please enter your first and last name.'); return; }
  if (!email)           { alert('Please enter your email address.'); return; }
  if (!phone)           { alert('Please enter your phone number.'); return; }
  gotoStep(2);
}

function gotoStep3() {
  const address = document.getElementById('address').value.trim();
  const street  = document.getElementById('street').value.trim();
  const city    = document.getElementById('city').value.trim();
  const zip     = document.getElementById('zip').value.trim();
  const state   = document.getElementById('state').value;
  const phone   = document.getElementById('phone2').value.trim();

  if (!address) { alert('Please enter your flat/house number and building name.'); return; }
  if (!street)  { alert('Please enter your street / area.'); return; }
  if (!city)    { alert('Please enter your city.'); return; }
  if (!zip)     { alert('Please enter your PIN code.'); return; }
  if (!state)   { alert('Please select your state.'); return; }
  if (!phone)   { alert('Please enter your delivery phone number.'); return; }

  gotoStep(3);
}

// ── Place order ────────────────────────────────────────────
function placeOrder() {
  const fname   = document.getElementById('fname').value.trim();
  const lname   = document.getElementById('lname').value.trim();
  const address = [
    document.getElementById('address').value.trim(),
    document.getElementById('street').value.trim(),
    document.getElementById('city').value.trim(),
    document.getElementById('state').value,
    document.getElementById('zip').value.trim()
  ].filter(Boolean).join(', ');

  const phone    = document.getElementById('phone2').value.trim();
  const user_lat = document.getElementById('user_lat').value || null;
  const user_lng = document.getElementById('user_lng').value || null;
  const payMethod = document.querySelector('input[name="pay"]:checked').value;

  if (!address || !phone) { alert('Address and phone are required!'); return; }

  const btn = document.getElementById('placeBtn');
  btn.disabled  = true;
  btn.innerText = 'Placing Order...';

  fetch('/place-order', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ address, phone, user_lat, user_lng })
  })
  .then(r => r.json())
  .then(order => {
    if (order.error) {
      alert('❌ ' + order.error);
      btn.disabled  = false;
      btn.innerText = 'Place Order →';
      return;
    }

    if (payMethod === 'cod') {
      alert('✅ Order placed! Pay on delivery.');
      window.location.href = '/orders';
      return;
    }

    // Razorpay payment
    const options = {
      key:         RAZORPAY_KEY,
      amount:      Math.round(order.amount * 100),
      currency:    'INR',
      name:        'FreshGrocery',
      description: 'Order #' + order.db_order_id,
      order_id:    order.order_id,
      handler: function(response) {
        fetch('/payment-success', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            payment_id:   response.razorpay_payment_id,
            db_order_id:  order.db_order_id
          })
        }).then(() => {
          alert('✅ Payment successful! Order placed.');
          window.location.href = '/orders';
        });
      },
      prefill: {
        name:    fname + ' ' + lname,
        email:   document.getElementById('email').value,
        contact: phone
      },
      theme: { color: '#1e3c72' }
    };

    const rzp = new Razorpay(options);
    rzp.on('payment.failed', () => {
      alert('Payment failed. Please try again.');
      btn.disabled  = false;
      btn.innerText = 'Place Order →';
    });
    rzp.open();
  })
  .catch(err => {
    console.error(err);
    alert('Error placing order. Please try again.');
    btn.disabled  = false;
    btn.innerText = 'Place Order →';
  });
}
</script>
</body>
</html>
